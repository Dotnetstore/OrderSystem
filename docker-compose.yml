services:
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

  api:
    image: ordersystem/api:dev
    build:
      context: .
      dockerfile: src/OrderSystem.Api/Dockerfile
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Data Source=/data/orders.db
      RabbitMq__Host: rabbitmq
      RabbitMq__Port: 5672
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - orders-data:/data

  dashboard:
    image: ordersystem/dashboard:dev
    build:
      context: .
      dockerfile: src/OrderSystem.Dashboard/Dockerfile
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  worker-processor:
    image: ordersystem/worker-processor:dev
    build:
      context: .
      dockerfile: src/OrderSystem.Workers/OrderSystem.Worker.Processor/Dockerfile
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RabbitMq__Host: rabbitmq
      RabbitMq__Port: 5672

  worker-notifier:
    image: ordersystem/worker-notifier:dev
    build:
      context: .
      dockerfile: src/OrderSystem.Workers/OrderSystem.Worker.Notifier/Dockerfile
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RabbitMq__Host: rabbitmq
      RabbitMq__Port: 5672

  worker-audit:
    image: ordersystem/worker-audit:dev
    build:
      context: .
      dockerfile: src/OrderSystem.Workers/OrderSystem.Worker.Audit/Dockerfile
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RabbitMq__Host: rabbitmq
      RabbitMq__Port: 5672

volumes:
  orders-data:
  rabbitmq-data:
