name: Publish Docker images

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish ${{ matrix.image }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: ordersystem-api
            dockerfile: src/OrderSystem.Api/Dockerfile
          - image: ordersystem-dashboard
            dockerfile: src/OrderSystem.Dashboard/Dockerfile
          - image: ordersystem-worker-processor
            dockerfile: src/OrderSystem.Workers/OrderSystem.Worker.Processor/Dockerfile
          - image: ordersystem-worker-notifier
            dockerfile: src/OrderSystem.Workers/OrderSystem.Worker.Notifier/Dockerfile
          - image: ordersystem-worker-audit
            dockerfile: src/OrderSystem.Workers/OrderSystem.Worker.Audit/Dockerfile

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
